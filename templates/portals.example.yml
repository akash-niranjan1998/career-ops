# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- AI/ML roles --
    - "Project Coordinator"
    - "Project Manager"
    - "IT Project Coordinator"
    - "Implementation Coordinator"
    - "Implementation Consultant"
    - "PMO Analyst"
    - "Project Management Analyst"
    - "Business Analyst"
    - "Operations Analyst"
    - "Technical Project Coordinator"
    - "Associate Project Manager"
    - "Assistant Project Manager"
    - "Project Control Officer"
    - "Agile Project Coordinator"
    - "Client Implementation Specialist"
    - "Reporting Coordinator"
    - "Delivery Coordinator"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Director"
    - "VP "
    - "Vice President"
    - "Principal"
    - "Staff Engineer"
    - "C++ "
    - "Embedded"
    - "Firmware"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
    - "Construction"
    - "Civil"
    - "Structural"
    - "Mechanical"
    - "Electrical Engineer"
    - "Site Supervisor"
    - "Field Coordinator"
    - "Estimator"
    - "Quantity Surveyor"
    - "Financial Planning"
    - "Financial Analyst"
    - "Investment"
    - "Mortgage"
    - "Insurance"
    - "Accounting"
    - "Payroll"
    - "Audit"
    - "Tax "
    - "Manufacturing"
    - "Supply Chain"
    - "Logistics"
    - "Warehouse"
    - "Procurement"
    - "Real Estate"
    - "Property"
    - "Mining"
    - "Oil "
    - "Gas "
    - "Energy"
    - "Utilities"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Lead"
    - "Junior"
    - "Associate"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  - name: Greenhouse — Project Coordinator Canada
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Project Coordinator" OR "IT Project Coordinator" Canada remote'
    enabled: true

  - name: Greenhouse — Implementation Consultant Canada
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Implementation Consultant" OR "Implementation Coordinator" Canada'
    enabled: true

  - name: Greenhouse — PMO Analyst Canada
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "PMO Analyst" OR "Project Management Analyst" Canada'
    enabled: true

  - name: Greenhouse — Business Analyst Canada
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Business Analyst" OR "Operations Analyst" Canada remote'
    enabled: true

  - name: Ashby — Project Coordinator Canada
    query: 'site:jobs.ashbyhq.com "Project Coordinator" OR "Implementation Coordinator" Canada remote'
    enabled: true

  - name: LinkedIn — Project Coordinator Vancouver
    query: '"Project Coordinator" OR "IT Project Coordinator" OR "PMO Analyst" Vancouver OR "British Columbia" OR remote Canada'
    enabled: true

  - name: Indeed — Implementation Consultant Canada
    query: 'site:ca.indeed.com "Implementation Consultant" OR "Implementation Coordinator" SaaS Canada remote'
    enabled: true

  - name: Indeed — Project Coordinator Canada
    query: 'site:ca.indeed.com "Project Coordinator" OR "Associate Project Manager" Canada hybrid OR remote'
    enabled: true

# -- Tracked companies --
